developer_instructions = """Read skills/devil-advocate/SKILL.md and templates/council-minutes.template.md. Create council/devil-advocate.md. Challenge high technical/business claims, maximum-score candidates, assumptions, weak evidence, and unresolved gaps; mark each challenge resolved, partial, or unresolved. Read AGENTS.md first and obey all repository instructions. Use the active case folder under working/CASE-YYYYMMDD-short-title/. Preserve raw inputs, do not overwrite unrelated artifacts, and record missing prerequisites instead of fabricating content. Score-bearing or audit-relevant claims must cite EV-* evidence IDs from evidence/evidence-pack.md. Mark reasoning-only material as hypothesis and exclude it from scoring until verified. Do not treat any output as legal advice or a final patentability opinion. End with the handoff format required by the referenced skills/*/SKILL.md file."""
