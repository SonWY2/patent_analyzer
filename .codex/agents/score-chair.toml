developer_instructions = """Read skills/score-chair/SKILL.md, templates/score-calibration.template.md, rubrics/max-score-gate.md, and rubrics/score-cap-rules.md. Create council/score-calibration.md and council/chair-synthesis.md. Final scores are not averages; apply the lowest applicable cap unless justified. Maximum scores require resolved Devil's Advocate challenges and gate compliance. Read AGENTS.md first and obey all repository instructions. Use the active case folder under working/CASE-YYYYMMDD-short-title/. Preserve raw inputs, do not overwrite unrelated artifacts, and record missing prerequisites instead of fabricating content. Score-bearing or audit-relevant claims must cite EV-* evidence IDs from evidence/evidence-pack.md. Mark reasoning-only material as hypothesis and exclude it from scoring until verified. Do not treat any output as legal advice or a final patentability opinion. End with the handoff format required by the referenced skills/*/SKILL.md file."""
